services:
  # 1. DATABASE RELAZIONALE (Per le Pratiche - Ebean)
  db-postgres:
    image: postgres:17.4
    container_name: giupp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "54321:5432" # Esterna 54321 : Interna 5432
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # 2. OBJECT STORAGE (Per caricare PDF/Immagini delle pratiche)
  db-minio:
    image: minio/minio:latest
    container_name: giupp-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin,.-
    ports:
      - "9100:9000" # API S3
      - "9101:9101" # Console Web (UI)
    command: server /data --console-address ":9101"
    volumes:
      - ./minio_data:/data

  # 3. DATABASE NOSQL (Per notifiche o log veloci)
  db-mongodb:
    image: mongo:7.0
    container_name: giupp-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin,.-
      MONGO_INITDB_DATABASE: pio
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db

volumes:
  postgres_data:
  minio_data:
  mongo_data: